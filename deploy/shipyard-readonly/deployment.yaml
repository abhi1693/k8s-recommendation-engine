apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-recommendation-engine
  namespace: k8s-recommendation-engine
  labels:
    app.kubernetes.io/name: k8s-recommendation-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-recommendation-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-recommendation-engine
    spec:
      serviceAccountName: k8s-recommendation-engine
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k8s-recommendation-engine
          image: ghcr.io/abhi1693/k8s-recommendation-engine:latest
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --config
            - /etc/k8s-recommendation-engine/profile.yaml
            - --prometheus-url
            - $(PROMETHEUS_URL)
            - --history-window
            - $(HISTORY_WINDOW)
            - --history-step
            - $(HISTORY_STEP)
            - --state-db
            - /var/lib/k8s-recommendation-engine/k8s-recommendation-engine.db
            - --interval
            - $(RECONCILE_INTERVAL)
            - --output
            - summary
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus-operated.monitoring.svc:9090
            - name: HISTORY_WINDOW
              value: 6h
            - name: HISTORY_STEP
              value: 5m
            - name: RECONCILE_INTERVAL
              value: 5m
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: profile
              mountPath: /etc/k8s-recommendation-engine
              readOnly: true
            - name: state
              mountPath: /var/lib/k8s-recommendation-engine
      volumes:
        - name: profile
          configMap:
            name: k8s-recommendation-engine-profile
            items:
              - key: shipyard-profile.yaml
                path: profile.yaml
        - name: state
          persistentVolumeClaim:
            claimName: k8s-recommendation-engine-state
