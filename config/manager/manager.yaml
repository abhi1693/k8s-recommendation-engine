apiVersion: v1
kind: Namespace
metadata:
  name: system
  labels:
    app.kubernetes.io/name: k8s-recommendation-engine
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: controller-state
  namespace: system
  labels:
    app.kubernetes.io/name: k8s-recommendation-engine
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    app.kubernetes.io/name: k8s-recommendation-engine
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-recommendation-engine
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-recommendation-engine
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: controller-manager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: controller:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/k8s-recommendation-engine
          args:
            - controller
            - --watch-namespace=$(POD_NAMESPACE)
            - --prometheus-url=$(PROMETHEUS_URL)
            - --state-db=/var/lib/k8s-recommendation-engine/controller.db
            - --state-retention=336h
            - --reconcile-timeout=5m
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PROMETHEUS_URL
              value: http://rancher-monitoring-prometheus.cattle-monitoring-system.svc:9090
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: state
              mountPath: /var/lib/k8s-recommendation-engine
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: controller-state
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 10
